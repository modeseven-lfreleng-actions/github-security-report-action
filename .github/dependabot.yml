version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI(actions)"
    # Wait before opening a bump PR so we don't churn on a release
    # that gets retracted or superseded shortly after it ships.
    # This is required to satisfy the zizmor workflow auditing tool.
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI(deps)"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
    exclude-paths:
      - "LICENSES/**"
  - package-ecosystem: "pip"
    # Runtime pin for the published tool this action installs at runtime.
    directory: "/.github/runtime-pin"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "CI(deps)"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
