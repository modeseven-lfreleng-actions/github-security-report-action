# Action test/validation workflow
name: "Test GitHub Action 🧪"

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  ### Test the GitHub Action in this Repository ###
  tests:
    name: "Test local GitHub Action"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: read  # read this repo's own security data (repo mode)
    timeout-minutes: 10
    steps:
      # Harden the runner used by this workflow
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout repository"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Repo mode: a self-contained run against this repository using the
      # ephemeral GITHUB_TOKEN. Always runs from this checkout (it is a
      # self-test of the action source, not a published release).
      - name: "Running local action: ${{ github.repository }}"
        uses: ./
        with:
          scope: "repo"
          token: "${{ github.token }}"
          fail_threshold: "none"  # informational; do not fail the test build
          use_local_source: "true"

      - name: "Validated local action: ${{ github.repository }}"
        shell: bash
        run: |
          # Local action validation
          echo "Validated local action: ${{ github.repository }} ✅"
          echo "Validation step summary output" >> "$GITHUB_STEP_SUMMARY"
