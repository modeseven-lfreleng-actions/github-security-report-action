---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

# Scheduled security/quality report. Runs daily, refreshing GitHub Pages every
# day; the Slack digest is posted only on the configured report_day (the tool
# owns that decision via the should_notify output).
name: "Security Report 🔐"

# yamllint disable-line rule:truthy
on:
  schedule:
    # Daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_notify:
        description: "Post report immediately to Slack"
        required: false
        type: boolean
        default: false
      use_local_source:
        description: "Run the tool from this checkout instead of PyPI (for testing unreleased code)"
        required: false
        type: boolean
        default: false

permissions: {}

concurrency:
  group: "security-report"
  cancel-in-progress: false

jobs:
  build:
    name: "Generate report"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # configure-pages reads (and can enable) the Pages site via the API;
      # without this the GITHUB_TOKEN cannot perform that Pages operation.
      pages: write
    timeout-minutes: 20
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: "Checkout repository"
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: "Configure Pages"
        # yamllint disable-line rule:line-length
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: "Resolve Pages URL"
        id: pages-url
        shell: bash
        run: |
          # Derive the Pages URL for the running repository so the Slack link
          # is correct in forks as well as upstream.
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY##*/}"
          echo "url=https://${owner}.github.io/${repo}/" >> "$GITHUB_OUTPUT"

      - name: "Generate report"
        id: report
        uses: ./
        with:
          scope: "org"
          # Plain JSON in a variable, or base64 JSON in a secret (the tool
          # accepts either). Secret wins when both are present.
          config: "${{ secrets.GSR_CONFIG || vars.GSR_CONFIG }}"
          # Org mode needs a classic PAT (security_events, repo, read:org); the
          # ephemeral GITHUB_TOKEN cannot read org-wide security data.
          token: "${{ secrets.SECURITY_REPORT_PAT }}"
          output_dir: "site"
          pages_url: "${{ steps.pages-url.outputs.url }}"
          slack_channel: "${{ vars.SLACK_CHANNEL_ID }}"
          force_notify: "${{ inputs.force_notify || 'false' }}"
          use_local_source: "${{ inputs.use_local_source || 'false' }}"

      - name: "Upload Pages artifact"
        # yamllint disable-line rule:line-length
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: "site"

      - name: "Check Slack configuration"
        id: slack-config
        if: steps.report.outputs.should_notify == 'true'
        shell: bash
        env:
          SLACK_BOT_TOKEN: "${{ secrets.SLACK_BOT_TOKEN }}"
          SLACK_CHANNEL_ID: "${{ vars.SLACK_CHANNEL_ID }}"
        run: |
          # Slack needs both a bot token and a channel id. If either is
          # missing, disable the integration gracefully rather than failing
          # the job, warning in both the console and the step summary.
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            msg="⚠️ Slack integration not available; requires token/credentials"
            echo "::warning::${msg}"
            echo "${msg}" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: "Send Slack digest"
        if: steps.slack-config.outputs.configured == 'true' && steps.report.outputs.slack_payload != ''
        # yamllint disable-line rule:line-length
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c  # v3.0.3
        with:
          method: "chat.postMessage"
          token: "${{ secrets.SLACK_BOT_TOKEN }}"
          payload: "${{ steps.report.outputs.slack_payload }}"

  deploy:
    name: "Deploy to GitHub Pages"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    timeout-minutes: 10
    steps:
      - name: "Harden runner"
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit

      - name: "Deploy to GitHub Pages"
        id: deployment
        # yamllint disable-line rule:line-length
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

      - name: "Publish report URL to summary"
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          {
            echo "## 📊 Security report published"
            echo ""
            echo "[${PAGE_URL}](${PAGE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"
